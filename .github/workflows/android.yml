name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# NOTE: this build ships NO embedded default tapd node (the OZARK_DEFAULT_TAPD_*
# secrets are intentionally not injected here) — it produces a clean test APK.
# Release APKs with the default node are built by android-release.yml on tags.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          echo "PROTOC=$(which protoc)" >> "$GITHUB_ENV"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27b
          link-to-sdk: true

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Android APK (aarch64)
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          NDK_BIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "Using NDK bin: $NDK_BIN"

          # OpenSSL / libsodium build scripts look for target-prefixed ar/ranlib.
          # Without these the C build fails (`make` exit 2) — this is the fix.
          mkdir -p "$HOME/.ndk-wrappers"
          ln -sf "$NDK_BIN/llvm-ar" "$HOME/.ndk-wrappers/aarch64-linux-android-ar"
          ln -sf "$NDK_BIN/llvm-ranlib" "$HOME/.ndk-wrappers/aarch64-linux-android-ranlib"
          export PATH="$HOME/.ndk-wrappers:$PATH"

          export CC_aarch64_linux_android="$NDK_BIN/aarch64-linux-android24-clang"
          export CXX_aarch64_linux_android="$NDK_BIN/aarch64-linux-android24-clang++"
          export AR_aarch64_linux_android="$NDK_BIN/llvm-ar"
          export RANLIB_aarch64_linux_android="$NDK_BIN/llvm-ranlib"

          npm run tauri android build -- --apk --target aarch64

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ozark-wallet-aarch64
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
