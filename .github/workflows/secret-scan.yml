name: secret-scan

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # scan full history, not just the tip
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          # Required since gitleaks-action's breaking change: pull_request scans
          # need a token to fetch the PR commits. Without it the PR scan errors out
          # (the push-triggered scan still works, but PR scanning was silently
          # broken repo-wide). The auto-provisioned token is sufficient.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
