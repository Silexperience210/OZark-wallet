# Self-hosted OZark gateway + a Tor sidecar that publishes it as an onion service.
# Run this on the same box as your litd/tapd (e.g. your Umbrel). Nothing is exposed
# to the host or LAN — only Tor can reach the gateway, on the internal network.
#
# Quick start (see DEPLOY.md for detail):
#   1) cp env.example .env  &&  edit .env  (tapd host)
#   2) put your litd tls.cert + tapd macaroon in ./secrets/
#   3) docker compose up -d --build
#   4) docker compose exec tor cat /var/lib/tor/ozark-gateway/hostname   # -> the onion
#   5) paste  http://<onion>.onion  into the wallet's Vault screen

services:
  gateway:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      OZARK_GATEWAY_LISTEN: 0.0.0.0:8787
      # host:port of your litd/tapd gRPC (e.g. litd on 8443). See DEPLOY.md.
      OZARK_GATEWAY_TAPD_HOST: ${OZARK_GATEWAY_TAPD_HOST}
      OZARK_GATEWAY_TAPD_CERT: /secrets/tls.cert
      OZARK_GATEWAY_TAPD_MACAROON: /secrets/tapd.macaroon
      # Optional: lnd macaroon (invoices:read) enabling LN-asset receive
      # auto-credit (detects invoice settlement via lnd's LookupInvoice, which the
      # tapd macaroon does not authorize). Leave empty to disable — LN receive then
      # still issues invoices, but settlement can't be observed. When set, drop the
      # macaroon in ./secrets and point at it, e.g. /secrets/lnd.macaroon.
      OZARK_GATEWAY_LND_MACAROON: ${OZARK_GATEWAY_LND_MACAROON:-}
      OZARK_GATEWAY_DB: /data/ozark-gateway.sqlite
      # Optional: set to http://<onion>.onion after first boot for strict URL
      # binding. Left empty, auth still binds each token to its endpoint (path-only).
      OZARK_GATEWAY_PUBLIC_URL: ${OZARK_GATEWAY_PUBLIC_URL:-}
      # Optional operator pubkey (64-hex Nostr) for the /v1/admin/* routes (open/
      # list asset channels, connect peers). Empty = admin routes disabled.
      OZARK_GATEWAY_ADMIN_PUBKEY: ${OZARK_GATEWAY_ADMIN_PUBKEY:-}
      # Set to 1 during setup for one-tap operator claim (POST /v1/admin/claim);
      # turn off after. Ignored once an operator exists.
      OZARK_GATEWAY_ALLOW_ADMIN_CLAIM: ${OZARK_GATEWAY_ALLOW_ADMIN_CLAIM:-}
      # Background maintenance interval (reconcile + solvency audit + invoice
      # purge), seconds. 0 disables the loop (per-request reconcile still runs).
      OZARK_GATEWAY_RECONCILE_INTERVAL_SECS: ${OZARK_GATEWAY_RECONCILE_INTERVAL_SECS:-60}
      # Encrypted ledger backups (recommended — the ledger IS the custody record).
      # Set DIR to /backups and KEY to a 32-byte hex secret to enable + encrypt.
      # Left empty = disabled. Without KEY, snapshots are written in the clear.
      OZARK_GATEWAY_BACKUP_DIR: ${OZARK_GATEWAY_BACKUP_DIR:-}
      OZARK_GATEWAY_BACKUP_KEY: ${OZARK_GATEWAY_BACKUP_KEY:-}
    volumes:
      - ./secrets:/secrets:ro
      - gateway-data:/data
      # Ledger snapshots land here when OZARK_GATEWAY_BACKUP_DIR=/backups. On the
      # host filesystem so you can ship them off-box (real DR needs off-box copies).
      - ./backups:/backups
    # Optional: attach to your node's docker network so `litd` resolves by name.
    # networks: [umbrel_main_network]

  tor:
    image: getumbrel/tor:0.4.7.8
    restart: unless-stopped
    volumes:
      - ./torrc:/etc/tor/torrc:ro
      - tor-data:/var/lib/tor
    depends_on:
      - gateway

volumes:
  gateway-data:
  tor-data:
